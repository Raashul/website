  <rect width="600" height="300" rx="12" fill="#1a1a2e"/>
  <text x="30" y="40" font-family="monospace" font-size="14" fill="#7f8c9b">~ terminal</text>
  <text x="30" y="80" font-family="monospace" font-size="14" fill="#50fa7b">$ </text>
